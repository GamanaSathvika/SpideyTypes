<!DOCTYPE html>
<html lang="en">
<head>
  <title>SpideyTypes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <nav class="nav-bar">
    <div class="logo-text">SPIDEY<span>TYPES</span></div>
    <div style="display:flex;gap:32px">
      <a>TypeTest</a>
      <a>Leaderboard</a>
      <a>Stats</a>
    </div>
  </nav>
</header>

<div class="main">

  <!-- PARAGRAPH DISPLAY -->
  <div class="text-box">
    <p class="para" id="para"></p>
  </div>

  <!-- INPUT ROW -->
  <div class="type-box">
    <input class="input-box" id="inputBox" type="text" placeholder="Start typing to begin…" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="stat-chip" id="wpmChip">0 WPM</div>
    <div class="stat-chip" id="counterChip">1:00</div>
    <button class="reset-btn" id="resetBtn" title="Reset (Esc)">↺</button>
  </div>

  <!-- RESULTS + SETTINGS -->
  <div class="result-box">

    <!-- Results -->
    <div class="results-panel">
      <div class="wpm-main" id="dispSpeed">—</div>
      <div class="wpm-label">WPM</div>
      <div class="stat-row"><span class="label">Raw WPM</span><span class="value" id="dispRaw">—</span></div>
      <div class="stat-row"><span class="label">Accuracy</span><span class="value" id="dispAcc">—</span></div>
      <div class="stat-row"><span class="label">Correct Words</span><span class="value" id="dispCC">—</span></div>
      <div class="stat-row"><span class="label">Incorrect Words</span><span class="value" id="dispWC">—</span></div>
    </div>

    <!-- Settings -->
    <div class="settings-panel">
      <div class="settings-title">Settings</div>

      <div class="setting-row">
        <span class="setting-label">Language</span>
        <select class="lang-select" id="langSelect">
          <option value="english">English</option>
          <option value="dutch">Dutch</option>
          <option value="french">French</option>
          <option value="german">German</option>
        </select>
      </div>

      <div class="setting-row">
        <span class="setting-label">Duration</span>
        <div class="btn-group" id="durationGroup">
          <button class="opt-btn select-time" data-val="10">0:10</button>
          <button class="opt-btn select-time" data-val="30">0:30</button>
          <button class="opt-btn select-time selected" data-val="60">1:00</button>
          <button class="opt-btn select-time" data-val="120">2:00</button>
          <button class="opt-btn select-time" data-val="300">5:00</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Highlight</span>
        <div class="btn-group" id="highlightGroup">
          <button class="opt-btn selected" data-mode="char">Char</button>
          <button class="opt-btn" data-mode="word">Word</button>
          <button class="opt-btn" data-mode="caret">Caret</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Error Flash</span>
        <div class="btn-group" id="errorGroup">
          <button class="opt-btn selected" data-val="on">On</button>
          <button class="opt-btn" data-val="off">Off</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Words</span>
        <div class="btn-group" id="wordsGroup">
          <button class="opt-btn selected" data-val="simple">Simple</button>
          <button class="opt-btn" data-val="advanced">Advanced</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Punctuation</span>
        <div class="btn-group" id="punctGroup">
          <button class="opt-btn" data-val="on">On</button>
          <button class="opt-btn selected" data-val="off">Off</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Numbers</span>
        <div class="btn-group" id="numbersGroup">
          <button class="opt-btn" data-val="on">On</button>
          <button class="opt-btn selected" data-val="off">Off</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Show WPM</span>
        <div class="btn-group" id="wpmGroup">
          <button class="opt-btn selected" data-val="show">Show</button>
          <button class="opt-btn" data-val="hide">Hide</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Show Timer</span>
        <div class="btn-group" id="timerGroup">
          <button class="opt-btn selected" data-val="show">Show</button>
          <button class="opt-btn" data-val="hide">Hide</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"> </script>
</body>
</html>
